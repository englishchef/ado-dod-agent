services:
  ado-dod-agent:
    container_name: ado-dod-agent
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./:/workspace
      - ./data:/workspace/data
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload
